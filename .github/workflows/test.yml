name: Generate LVGL Built-in Fonts

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test.yml'

jobs:
  generate-fonts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false  # Fonts are in repo

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install astyle

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install lv_font_conv globally
      run: |
        npm install -g lv_font_conv

    - name: Make scripts executable
      run: |
        chmod +x scripts/built_in_font/*.py

    - name: Make font directory
      run: |
        mkdir -p src/font

    - name: Generate fonts
      working-directory: ./scripts/built_in_font
      run: |
        python3 generate_all.py

    - name: Debug full directory listing
      working-directory: ./scripts/built_in_font
      run: |
        pwd
        ls -la ../src/font/ || echo "No src/font"
        ls -la ./
        find ../ -name "lv_font*.c" 2>/dev/null || echo "No font files found"

    - name: Upload generated fonts
      uses: actions/upload-artifact@v7
      with:
        name: lvgl-built-in-fonts
        path: |
          scripts/built_in_font/*.c
          src/font/*.c
          lvgl/src/font/*.c
        retention-days: 7